<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPACESIS - Planets</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
     <!-- Navbar -->
    <nav class="navbar">
       <div id="navbar-placeholder"></div>
    </nav>
    <!-- Page Header -->
    <section class="page-header">
        <div class="container text-center">
            <h1>Planets</h1>
            <p class="lead">Explore the 8 planets of our solar system</p>
        </div>
    </section>

    <!-- Quick Filter -->
    <section class="container">
        <div class="filter-buttons text-center">
            <button class="btn btn-filter active" onclick="filterPlanets('all')">All</button>
            <button class="btn btn-filter" onclick="filterPlanets('terrestrial')">Terrestrial</button>
            <button class="btn btn-filter" onclick="filterPlanets('gas')">Gas Giants</button>
            <button class="btn btn-filter" onclick="filterPlanets('ice')">Ice Giants</button>
        </div>
    </section>

    <!-- Planets Grid -->
    <section class="section">
        <div class="container">
            <div class="row" id="planets-grid"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div>
                    <h4>SPACESIS</h4>
                    <p>Discover the wonders of space from your home.</p>
                </div>
                <div>
                    <h4>Quick Links</h4>
                    <ul class="footer-links">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="explore.html">Explore</a></li>
                        <li><a href="planets.html">Planets</a></li>
                    </ul>
                </div>
                <div>
                    <h4>Resources</h4>
                    <ul class="footer-links">
                        <li><a href="quiz.html">Quiz</a></li>
                        <li><a href="games.html">Games</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 SPACESIS. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Back to Top -->
    <button class="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <i class="fas fa-arrow-up"></i>
    </button>

    <style>
        /* Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0a1a;
            color: #ffffff;
        }

        /* Navbar */
        .navbar {
            background: #0f0f2a;
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #2a2a4a;
        }

        .navbar-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-brand {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
        }

        .navbar-brand span {
            color: #ff6b6b;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 1.5rem;
        }

        .nav-link {
            color: #b8b8d0;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-link:hover,
        .nav-link.active {
            color: white;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: white;
            margin: 2px 0;
        }

        /* Page Header */
        .page-header {
            padding: 120px 0 40px;
            text-align: center;
        }

        .page-header h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: #b8b8d0;
            font-size: 1.2rem;
        }

        /* Filter Buttons */
        .filter-buttons {
            margin: 2rem 0;
        }

        .btn-filter {
            background: transparent;
            color: white;
            border: 1px solid #6c5ce7;
            margin: 0 5px;
            padding: 0.6rem 1.8rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .btn-filter:hover,
        .btn-filter.active {
            background: #6c5ce7;
        }

        /* Section */
        .section {
            padding: 3rem 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Planet Cards */
        .planet-card {
            background: #1a1a3a;
            border: 1px solid #2a2a4a;
            border-radius: 15px;
            padding: 1.8rem 1.5rem;
            margin-bottom: 2rem;
            cursor: pointer;
            transition: all 0.3s;
            height: 100%;
            text-align: center;
        }

        .planet-card:hover {
            transform: translateY(-10px);
            border-color: #6c5ce7;
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.2);
        }

        .planet-image {
            width: 140px;
            height: 140px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #6c5ce7;
            transition: transform 0.5s;
        }

        .planet-card:hover .planet-image {
            transform: rotate(15deg) scale(1.05);
        }

        .planet-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-title {
            font-size: 1.6rem;
            margin-bottom: 0.5rem;
            color: white;
        }

        .planet-distance {
            color: #6c5ce7;
            font-size: 0.95rem;
            margin-bottom: 0.8rem;
            font-weight: 500;
        }

        .card-text {
            color: #b8b8d0;
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
            line-height: 1.5;
        }

        .planet-tag {
            display: inline-block;
            padding: 0.3rem 1.2rem;
            background: rgba(108, 92, 231, 0.15);
            border: 1px solid #6c5ce7;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #b8b8d0;
            text-transform: capitalize;
        }

        /* Modal */
        .planet-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a3a, #0a0a2a);
            max-width: 900px;
            width: 100%;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #6c5ce7;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2rem;
            cursor: pointer;
            color: white;
            transition: color 0.3s;
            z-index: 1;
        }

        .close-modal:hover {
            color: #ff6b6b;
        }

        .modal-image {
            width: 250px;
            height: 250px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #6c5ce7;
        }

        .modal-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .fact-list {
            list-style: none;
            padding: 0;
            margin: 1.5rem 0;
        }

        .fact-list li {
            padding: 0.8rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: #b8b8d0;
        }

        .fact-list li strong {
            color: #6c5ce7;
            width: 140px;
            display: inline-block;
        }

        .fun-fact {
            background: rgba(108, 92, 231, 0.1);
            padding: 1.2rem;
            border-radius: 10px;
            border-left: 3px solid #6c5ce7;
            color: white;
        }

        /* Footer */
        .footer {
            background: #0a0a1a;
            padding: 3rem 0 1.5rem;
            border-top: 1px solid #2a2a4a;
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .footer h4 {
            margin-bottom: 1rem;
            color: white;
        }

        .footer p {
            color: #b8b8d0;
        }

        .footer-links {
            list-style: none;
            padding: 0;
        }

        .footer-links li {
            margin-bottom: 0.5rem;
        }

        .footer-links a {
            color: #b8b8d0;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: white;
        }

        .footer-bottom {
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid #2a2a4a;
            color: #b8b8d0;
        }

        /* Back to Top */
        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: #6c5ce7;
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: none;
            z-index: 99;
        }

        .back-to-top.show {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hamburger {
                display: flex;
            }

            .nav-menu {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: #0f0f2a;
                flex-direction: column;
                padding: 1rem;
            }

            .nav-menu.active {
                display: flex;
            }

            .filter-buttons {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 0.5rem;
            }

            .btn-filter {
                margin: 0;
                padding: 0.4rem 1.2rem;
                font-size: 0.9rem;
            }

            .footer-content {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .modal-content {
                padding: 20px;
            }

            .modal-image {
                width: 180px;
                height: 180px;
            }

            .fact-list li strong {
                width: 100px;
            }
        }
    </style>

    <script>
        // Planet Data with Image URLs
        const planets = [
            {
                id: 'mercury',
                name: 'Mercury',
                type: 'terrestrial',
                distance: '57.9 million km',
                temp: '-173°C to 427°C',
                moons: 0,
                day: '59 Earth days',
                year: '88 Earth days',
                desc: 'The smallest planet and closest to the Sun. Has a rocky surface covered in craters.',
                funFact: 'A day on Mercury is longer than its year!',
                image: 'images/planets/mercury.jpg'
            },
            {
                id: 'venus',
                name: 'Venus',
                type: 'terrestrial',
                distance: '108.2 million km',
                temp: '462°C',
                moons: 0,
                day: '243 Earth days',
                year: '225 Earth days',
                desc: 'Often called Earth\'s twin due to similar size. Has a thick toxic atmosphere.',
                funFact: 'Venus rotates backwards compared to most planets.',
                image: 'images/planets/venus.jpg'
            },
            {
                id: 'earth',
                name: 'Earth',
                type: 'terrestrial',
                distance: '149.6 million km',
                temp: '15°C (average)',
                moons: 1,
                day: '24 hours',
                year: '365 days',
                desc: 'Our home planet. The only known place with life in the universe.',
                funFact: 'Earth is the only planet not named after a god.',
                image: 'https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80'
            },
            {
                id: 'mars',
                name: 'Mars',
                type: 'terrestrial',
                distance: '227.9 million km',
                temp: '-60°C',
                moons: 2,
                day: '24.6 hours',
                year: '687 Earth days',
                desc: 'The Red Planet. Has the largest volcano in the solar system.',
                funFact: 'Mars has the tallest mountain in the solar system (Olympus Mons).',
                image: 'https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80'
            },
            {
                id: 'jupiter',
                name: 'Jupiter',
                type: 'gas',
                distance: '778.5 million km',
                temp: '-110°C',
                moons: 79,
                day: '9.9 hours',
                year: '11.9 Earth years',
                desc: 'The largest planet. Has a Great Red Spot that\'s a giant storm.',
                funFact: 'Jupiter has 79 moons, more than any other planet.',
                image: 'images/planets/jupiter.jpg'
            },
            {
                id: 'saturn',
                name: 'Saturn',
                type: 'gas',
                distance: '1.4 billion km',
                temp: '-140°C',
                moons: 82,
                day: '10.7 hours',
                year: '29.5 Earth years',
                desc: 'Famous for its beautiful rings made of ice and rock.',
                funFact: 'Saturn is the least dense planet - it would float in water!',
                image: 'images/planets/saturn.jpg'
            },
            {
                id: 'uranus',
                name: 'Uranus',
                type: 'ice',
                distance: '2.9 billion km',
                temp: '-195°C',
                moons: 27,
                day: '17.2 hours',
                year: '84 Earth years',
                desc: 'Rotates on its side. Called an "ice giant".',
                funFact: 'Uranus was the first planet discovered with a telescope.',
                image: 'images/planets/uranus.jpg'
            },
            {
                id: 'neptune',
                name: 'Neptune',
                type: 'ice',
                distance: '4.5 billion km',
                temp: '-200°C',
                moons: 14,
                day: '16 hours',
                year: '165 Earth years',
                desc: 'The windiest planet. Has supersonic winds.',
                funFact: 'Neptune has 14 moons, with Triton being the largest.',
                 image: 'images/planets/neptune.jpg'
            }
        ];

        // Load Planets
        function loadPlanets(filter = 'all') {
            const grid = document.getElementById('planets-grid');
            grid.innerHTML = '';
            
            const filtered = filter === 'all' ? planets : planets.filter(p => p.type === filter);
            
            filtered.forEach(planet => {
                const col = document.createElement('div');
                col.className = 'col-lg-3 col-md-4 col-sm-6';
                col.innerHTML = `
                    <div class="planet-card" onclick="showPlanet('${planet.id}')">
                        <div class="planet-image">
                            <img src="${planet.image}" alt="${planet.name}">
                        </div>
                        <h3 class="card-title">${planet.name}</h3>
                        <p class="planet-distance">${planet.distance}</p>
                        <p class="card-text">${planet.desc.substring(0, 45)}...</p>
                        <span class="planet-tag">${planet.type}</span>
                    </div>
                `;
                grid.appendChild(col);
            });
        }

        // Show Planet Details
        function showPlanet(id) {
            const planet = planets.find(p => p.id === id);
            if (!planet) return;
            
            const modal = document.createElement('div');
            modal.className = 'planet-modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <span class="close-modal" onclick="this.closest('.planet-modal').remove()">&times;</span>
                    <div class="row">
                        <div class="col-md-5 text-center">
                            <div class="modal-image">
                                <img src="${planet.image}" alt="${planet.name}">
                            </div>
                            <h2 class="mt-3">${planet.name}</h2>
                            <p class="planet-tag">${planet.type}</p>
                        </div>
                        <div class="col-md-7">
                            <p>${planet.desc}</p>
                            <ul class="fact-list">
                                <li><strong>Distance:</strong> ${planet.distance}</li>
                                <li><strong>Temperature:</strong> ${planet.temp}</li>
                                <li><strong>Moons:</strong> ${planet.moons}</li>
                                <li><strong>Day length:</strong> ${planet.day}</li>
                                <li><strong>Year length:</strong> ${planet.year}</li>
                            </ul>
                            <div class="fun-fact">
                                <strong>✨ Fun Fact:</strong> ${planet.funFact}
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        // Filter Planets
        function filterPlanets(type) {
            document.querySelectorAll('.btn-filter').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            loadPlanets(type);
        }

        // Back to top
        window.addEventListener('scroll', () => {
            const backToTop = document.querySelector('.back-to-top');
            if (window.scrollY > 500) {
                backToTop.classList.add('show');
            } else {
                backToTop.classList.remove('show');
            }
        });

        // Mobile menu
        const hamburger = document.querySelector('.hamburger');
        const navMenu = document.querySelector('.nav-menu');

        hamburger?.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
        });

        // Close modal on outside click
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('planet-modal')) {
                e.target.remove();
            }
        });

        // Initialize
        window.addEventListener('load', () => {
            loadPlanets('all');
        });
    </script>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/animations.js"></script>
</body>
</html>
