<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPACESIS - Login | Sign Up</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
     <!-- Navbar -->
    <nav class="navbar">
       <div id="navbar-placeholder"></div>
    </nav>
    <!-- Stars Background -->
    <div class="stars-container"></div>

    <!-- Login/Signup Section -->
    <section class="auth-section" style="min-height: 100vh; display: flex; align-items: center; padding: 100px 0;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <!-- Toggle Buttons -->
                    <div class="auth-toggle text-center mb-4">
                        <button class="toggle-btn active" onclick="showLogin()" id="login-toggle">Login</button>
                        <button class="toggle-btn" onclick="showSignup()" id="signup-toggle">Sign Up</button>
                    </div>

                    <!-- Login Form -->
                    <div class="auth-card" id="login-form">
                        <div class="auth-header text-center mb-4">
                            <i class="fas fa-user-astronaut fa-3x" style="color: #6c5ce7;"></i>
                            <h2>Welcome Back</h2>
                            <p>Login to continue your space journey</p>
                        </div>

                        <form id="login" onsubmit="handleLogin(event)">
                            <div class="form-group mb-3">
                                <label for="login-email" class="form-label">
                                    <i class="fas fa-envelope"></i> Email
                                </label>
                                <input type="email" class="form-control" id="login-email" placeholder="Enter your email" required>
                            </div>

                            <div class="form-group mb-3">
                                <label for="login-password" class="form-label">
                                    <i class="fas fa-lock"></i> Password
                                </label>
                                <input type="password" class="form-control" id="login-password" placeholder="Enter your password" required>
                            </div>

                            <div class="form-check mb-3">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label" for="remember">Remember me</label>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 mb-3">
                                <i class="fas fa-rocket"></i> Launch Login
                            </button>

                            <div class="text-center">
                                <a href="#" onclick="forgotPassword()">Forgot Password?</a>
                            </div>
                        </form>

                        <!-- Social Login -->
                        <div class="social-login mt-4">
                            <p class="text-center">Or login with</p>
                            <div class="social-buttons">
                                <button class="social-btn google" onclick="socialLogin('google')">
                                    <i class="fab fa-google"></i>
                                </button>
                                <button class="social-btn facebook" onclick="socialLogin('facebook')">
                                    <i class="fab fa-facebook-f"></i>
                                </button>
                                <button class="social-btn github" onclick="socialLogin('github')">
                                    <i class="fab fa-github"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Signup Form -->
                    <div class="auth-card" id="signup-form" style="display: none;">
                        <div class="auth-header text-center mb-4">
                            <i class="fas fa-rocket fa-3x" style="color: #6c5ce7;"></i>
                            <h2>Join the Mission</h2>
                            <p>Create your astronaut profile</p>
                        </div>

                        <form id="signup" onsubmit="handleSignup(event)">
                            <div class="form-group mb-3">
                                <label for="signup-name" class="form-label">
                                    <i class="fas fa-user"></i> Full Name
                                </label>
                                <input type="text" class="form-control" id="signup-name" placeholder="Enter your name" required>
                            </div>

                            <div class="form-group mb-3">
                                <label for="signup-email" class="form-label">
                                    <i class="fas fa-envelope"></i> Email
                                </label>
                                <input type="email" class="form-control" id="signup-email" placeholder="Enter your email" required>
                            </div>

                            <div class="form-group mb-3">
                                <label for="signup-password" class="form-label">
                                    <i class="fas fa-lock"></i> Password
                                </label>
                                <input type="password" class="form-control" id="signup-password" placeholder="Create a password" required>
                                <small class="text-muted">Must be at least 8 characters</small>
                            </div>

                            <div class="form-group mb-3">
                                <label for="signup-confirm" class="form-label">
                                    <i class="fas fa-lock"></i> Confirm Password
                                </label>
                                <input type="password" class="form-control" id="signup-confirm" placeholder="Confirm password" required>
                            </div>

                            <div class="form-check mb-3">
                                <input type="checkbox" class="form-check-input" id="terms" required>
                                <label class="form-check-label" for="terms">
                                    I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                                </label>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 mb-3">
                                <i class="fas fa-user-astronaut"></i> Create Account
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div id="footer-placeholder"></div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/login.js"></script>

    <style>
        /* Auth Toggle */
        .auth-toggle {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }
        
        .toggle-btn {
            padding: 0.8rem 2rem;
            background: transparent;
            border: 2px solid #6c5ce7;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
            font-weight: 500;
        }
        
        .toggle-btn.active {
            background: #6c5ce7;
            box-shadow: 0 0 20px #6c5ce7;
        }
        
        .toggle-btn:hover {
            background: #6c5ce7;
        }
        
        /* Auth Card */
        .auth-card {
            background: rgba(10, 10, 26, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid #6c5ce7;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 0 50px rgba(108, 92, 231, 0.3);
            animation: fadeIn 0.5s;
        }
        
        .auth-header h2 {
            color: white;
            margin: 1rem 0 0.5rem;
        }
        
        .auth-header p {
            color: rgba(255,255,255,0.7);
        }
        
        /* Form */
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            color: white;
            margin-bottom: 0.5rem;
            display: block;
        }
        
        .form-label i {
            color: #6c5ce7;
            margin-right: 0.5rem;
        }
        
        .form-control {
            background: rgba(255,255,255,0.1);
            border: 1px solid #6c5ce7;
            color: white;
            padding: 0.8rem;
            border-radius: 10px;
            transition: 0.3s;
        }
        
        .form-control:focus {
            background: rgba(255,255,255,0.15);
            border-color: #a463f5;
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.3);
            outline: none;
        }
        
        .form-control::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .form-check-input {
            background: rgba(255,255,255,0.1);
            border: 1px solid #6c5ce7;
        }
        
        .form-check-input:checked {
            background: #6c5ce7;
            border-color: #6c5ce7;
        }
        
        .form-check-label {
            color: rgba(255,255,255,0.8);
        }
        
        .form-check-label a {
            color: #6c5ce7;
        }
        
        .form-check-label a:hover {
            text-decoration: underline;
        }
        
        /* Password Strength */
        .password-strength {
            height: 5px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            margin-top: 0.5rem;
            overflow: hidden;
        }
        
        .strength-bar {
            height: 100%;
            width: 0;
            transition: 0.3s;
        }
        
        .strength-bar.weak {
            width: 33%;
            background: #d63031;
        }
        
        .strength-bar.medium {
            width: 66%;
            background: #fdcb6e;
        }
        
        .strength-bar.strong {
            width: 100%;
            background: #00b894;
        }
        
        /* Social Login */
        .social-login {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 1.5rem;
            margin-top: 1.5rem;
        }
        
        .social-login p {
            color: rgba(255,255,255,0.6);
            margin-bottom: 1rem;
        }
        
        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }
        
        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            font-size: 1.2rem;
        }
        
        .social-btn.google {
            background: #DB4437;
        }
        
        .social-btn.facebook {
            background: #4267B2;
        }
        
        .social-btn.github {
            background: #333;
        }
        
        .social-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        /* Error messages */
        .error-message {
            color: #d63031;
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }
        
        .form-control.error {
            border-color: #d63031;
        }
        
        /* Success message */
        .success-message {
            background: #00b894;
            color: white;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            text-align: center;
            animation: slideDown 0.3s;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Forgot password modal */
        .forgot-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .forgot-content {
            background: linear-gradient(135deg, #1a1a3a, #0a0a2a);
            padding: 2rem;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            border: 1px solid #6c5ce7;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .auth-card {
                padding: 1.5rem;
            }
            
            .toggle-btn {
                padding: 0.6rem 1.5rem;
                font-size: 0.9rem;
            }
            
            .social-btn {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
        }
    </style>

    <script>
        // Toggle between login and signup
        function showLogin() {
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('signup-form').style.display = 'none';
            document.getElementById('login-toggle').classList.add('active');
            document.getElementById('signup-toggle').classList.remove('active');
        }
        
        function showSignup() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('signup-form').style.display = 'block';
            document.getElementById('login-toggle').classList.remove('active');
            document.getElementById('signup-toggle').classList.add('active');
        }
        
        // Handle login
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            // Simple validation
            if (!email || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            if (!isValidEmail(email)) {
                showMessage('Please enter a valid email', 'error');
                return;
            }
            
            // Simulate login
            showMessage('Login successful! Redirecting...', 'success');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        }
        
        // Handle signup
        function handleSignup(event) {
            event.preventDefault();
            
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const confirm = document.getElementById('signup-confirm').value;
            
            // Validation
            if (!name || !email || !password || !confirm) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            if (!isValidEmail(email)) {
                showMessage('Please enter a valid email', 'error');
                return;
            }
            
            if (password.length < 8) {
                showMessage('Password must be at least 8 characters', 'error');
                return;
            }
            
            if (password !== confirm) {
                showMessage('Passwords do not match', 'error');
                return;
            }
            
            // Simulate signup
            showMessage('Account created successfully! Please login.', 'success');
            setTimeout(() => {
                showLogin();
            }, 2000);
        }
        
        // Email validation
        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }
        
        // Show message
        function showMessage(msg, type) {
            // Remove existing message
            const existing = document.querySelector('.success-message');
            if (existing) existing.remove();
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'success-message';
            messageDiv.style.background = type === 'error' ? '#d63031' : '#00b894';
            messageDiv.textContent = msg;
            
            const activeForm = document.querySelector('.auth-card:not([style*="none"])');
            activeForm.insertBefore(messageDiv, activeForm.firstChild);
            
            setTimeout(() => {
                messageDiv.remove();
            }, 3000);
        }
        
        // Password strength checker
        document.getElementById('signup-password')?.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;
            
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/)) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;
            
            // Update strength bar
            let strengthBar = document.querySelector('.strength-bar');
            if (!strengthBar) {
                const container = document.createElement('div');
                container.className = 'password-strength';
                container.innerHTML = '<div class="strength-bar"></div>';
                this.parentNode.appendChild(container);
                strengthBar = container.querySelector('.strength-bar');
            }
            
            if (strength <= 2) {
                strengthBar.className = 'strength-bar weak';
            } else if (strength <= 4) {
                strengthBar.className = 'strength-bar medium';
            } else {
                strengthBar.className = 'strength-bar strong';
            }
        });
        
        // Forgot password
        function forgotPassword() {
            const modal = document.createElement('div');
            modal.className = 'forgot-modal';
            modal.innerHTML = `
                <div class="forgot-content">
                    <h3 class="text-center mb-3">Reset Password</h3>
                    <p class="text-center mb-3">Enter your email to receive reset instructions</p>
                    <input type="email" class="form-control mb-3" placeholder="Your email" id="reset-email">
                    <button class="btn btn-primary w-100 mb-2" onclick="sendReset()">Send Reset Link</button>
                    <button class="btn btn-secondary w-100" onclick="this.closest('.forgot-modal').remove()">Cancel</button>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        function sendReset() {
            const email = document.getElementById('reset-email').value;
            if (email && isValidEmail(email)) {
                alert('Reset link sent to ' + email);
                document.querySelector('.forgot-modal').remove();
            } else {
                alert('Please enter a valid email');
            }
        }
        
        // Social login
        function socialLogin(provider) {
            alert(`Login with ${provider} coming soon!`);
        }
    </script>
</body>
</html>
